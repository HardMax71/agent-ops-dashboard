site_name: AgentOps Dashboard
docs_dir: .
site_dir: ../site

nav:
  - Overview: index.md
  - PRDs:
      - Master Overview: prd/PRD-001-master-overview.md
      - Frontend & UX: prd/PRD-002-frontend-ux.md
      - LangGraph Orchestration: prd/PRD-003-langgraph-orchestration.md
      - Agent Layer: prd/PRD-004-agent-layer.md
      - LangSmith Observability: prd/PRD-005-langsmith-observability.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

plugins:
  - search
  - macros

markdown_extensions:
  - tables
  - fenced_code
  - toc:
      permalink: true
