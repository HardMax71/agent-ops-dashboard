services:
  # ── Core stack ────────────────────────────────────────────────────────

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: agentops
      POSTGRES_DB: agentops
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d agentops"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports: ["127.0.0.1:6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports: ["8000:8000", "8001:8001"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentops:agentops@db:5432/agentops
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      target: worker
    ports: ["8002:8002"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentops:agentops@db:5432/agentops
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - chroma_data:/data/chroma

  frontend:
    build:
      context: frontend
    ports: ["5173:80"]
    depends_on:
      api:
        condition: service_healthy

  # ── Agents (profile: agents) ──────────────────────────────────────────

  investigator:
    build:
      context: agents/investigator
    expose: ["8001"]
    env_file: .env
    profiles: ["agents", "full"]

  codebase-search:
    build:
      context: agents/codebase_search
    expose: ["8002"]
    env_file: .env
    volumes:
      - chroma_data:/data/chroma
    profiles: ["agents", "full"]

  web-search:
    build:
      context: agents/web_search
    expose: ["8003"]
    env_file: .env
    profiles: ["agents", "full"]

  critic:
    build:
      context: agents/critic
    expose: ["8004"]
    env_file: .env
    profiles: ["agents", "full"]

  writer:
    build:
      context: agents/writer
    expose: ["8005"]
    env_file: .env
    profiles: ["agents", "full"]

  # ── Observability (profile: full) ─────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["127.0.0.1:9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
      - worker
    profiles: ["full"]

  langflow:
    image: langflowai/langflow:1.1
    ports: ["7860:7860"]
    environment:
      LANGFLOW_DATABASE_URL: "sqlite:////data/langflow.db"
    volumes:
      - langflowdata:/data
      - ./langflow/flows:/flows
    profiles: ["full"]

volumes:
  pgdata:
  redisdata:
  langflowdata:
  chroma_data:
