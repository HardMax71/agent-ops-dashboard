name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - name: Auto-fix lint + format (non-dangerous)
        run: uv run ruff check --fix . && uv run ruff format .
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run ty check src/ agents/investigator/src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run pytest tests/unit/ -v --timeout=30 --cov=src/agentops --cov-report=term-missing

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf  # v3
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --all-groups
      - name: Export GraphQL schema
        run: uv run agentops-codegen
      - name: Check schema drift
        run: git diff --exit-code schemas/
      - name: Generate frontend SDK
        working-directory: frontend
        run: npm ci && npm run generate
      - name: Check frontend SDK drift
        run: git diff --exit-code frontend/src/generated/

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
