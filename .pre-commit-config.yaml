repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '\.graphql$'
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=200]
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: ty-check
        name: ty type-check
        entry: uv run ty check src/
        language: system
        pass_filenames: false
        types: [python]
      - id: schema-drift-check
        name: check GraphQL schema drift
        entry: bash -c 'uv run agentops-codegen && git diff --exit-code schemas/'
        language: system
        pass_filenames: false
        files: ^(src/agentops/|schemas/)
