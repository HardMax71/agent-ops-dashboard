server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        access_log off;
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cookie_path /auth /api/auth;
    }

    location /graphql {
        access_log off;
        proxy_pass http://api:8000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # LangFlow runs on its own port (localhost:7860) — it's a separate SPA
    # that can't be sub-pathed behind /langflow/ without asset path conflicts.
    location /langflow/ {
        return 302 http://localhost:7860/;
    }
}
